services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_PID=Developer
      - MSSQL_SA_PASSWORD=${MBAM_SQL_SA_PASSWORD:-LocalDevSql!234}
    volumes:
      - mbam-sql-data:/var/opt/mssql

  frontend:
    build:
      context: ../..
      dockerfile: infra/local/frontend.Dockerfile
    ports:
      - "4200:4200"
    volumes:
      - ../../client:/app
      - /app/node_modules
    command: npm start
    environment:
      - CHOKIDAR_USEPOLLING=true

  backend:
    build:
      context: ../..
      dockerfile: infra/local/backend.Dockerfile
    depends_on:
      - db
    ports:
      - "7071:7071"
    volumes:
      - ../../api:/home/site/wwwroot
      - /home/site/wwwroot/node_modules
    command: bash -c "npm run build && npm run watch & func start --javascript --port 7071 --watch"
    environment:
      - AzureWebJobsStorage=UseDevelopmentStorage=true
      - FUNCTIONS_WORKER_RUNTIME=node
      - FUNCTIONS_INPROC_NET8_ENABLED=1
      - SqlConnectionString=Server=db,1433;Initial Catalog=ManitobaMastersLocal;User ID=sa;Password=${MBAM_SQL_SA_PASSWORD:-LocalDevSql!234};Encrypt=False;TrustServerCertificate=True;Connection Timeout=30;

volumes:
  mbam-sql-data:
