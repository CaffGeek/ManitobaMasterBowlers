name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client-azure-webapp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Inject TinyMCE API key (optional)
        env:
          TINYMCE_API_KEY: ${{ secrets.TINYMCE_API_KEY }}
        run: |
          if [ -n "${TINYMCE_API_KEY}" ]; then
            echo "{ \"apiKey\": \"${TINYMCE_API_KEY}\" }" > src/environments/tinymce.secret.json
          fi

      - name: Verify TinyMCE key injected
        run: |
          if [ -f src/environments/tinymce.secret.json ]; then
            echo "tinymce.secret.json exists"
            wc -c src/environments/tinymce.secret.json
          else
            echo "tinymce.secret.json missing"
            exit 1
          fi

      - name: Build Angular app
        run: npm run build -- --configuration production

      - name: Copy TinyMCE assets into build
        run: |
          mkdir -p dist/beta/assets/tinymce
          cp -R node_modules/tinymce/* dist/beta/assets/tinymce/

      - name: Verify TinyMCE assets in build
        run: |
          if [ -d dist/beta/assets/tinymce ]; then
            echo "TinyMCE assets found"
            ls -la dist/beta/assets/tinymce | head -n 20
          else
            echo "TinyMCE assets missing in dist/beta/assets/tinymce"
            exit 1
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: client/dist/beta

  api-azure-functions:
    needs: client-azure-webapp
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Functions (TypeScript -> dist)
        run: npm run build

      - name: Prune dev dependencies for deploy
        run: npm prune --production

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

      - name: Restart Azure Functions host
        env:
          AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        run: |
          python -c "import os, xml.etree.ElementTree as ET; root = ET.fromstring(os.environ['AZURE_FUNCTIONAPP_PUBLISH_PROFILE']); profile = next((p for p in root.findall('.//publishProfile') if '.scm.' in p.attrib.get('publishUrl', '')), root.find('.//publishProfile')); print(f'SCM_HOST={profile.attrib[\"publishUrl\"].replace(\":443\", \"\")}'); print(f'SCM_USERNAME={profile.attrib[\"userName\"]}'); print(f'SCM_PASSWORD={profile.attrib[\"userPWD\"]}')" >> $GITHUB_ENV

      - name: Wait for restart to settle
        run: |
          curl --fail-with-body --user "$SCM_USERNAME:$SCM_PASSWORD" --request POST "https://$SCM_HOST/api/app/restart"
          sleep 20
